<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT and reclaim | INFINITE LEDGER</title>
    <style>
        :root {
            --nv-green: #00ff41;
            --firefly-gold: rgba(241, 196, 15, 0.8);
            --deep-black: #05080a;
            --sea-blue: #2980b9;
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            font-family: 'Consolas', 'Courier New', monospace;
            color: var(--nv-green);
            overflow-x: hidden;
        }

        /* --- BACKGROUND: BIG TREE & FIREFLIES --- */
        .bg-fixed {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 100%, rgba(0, 255, 65, 0.15) 0%, #000 85%);
            overflow: hidden;
        }
        .big-tree {
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 85%; max-width: 750px; opacity: 0.5;
            filter: drop-shadow(0 0 20px var(--nv-green));
            pointer-events: none;
        }
        .firefly {
            position: absolute; width: 3px; height: 3px;
            background: var(--firefly-gold); border-radius: 50%;
            box-shadow: 0 0 8px 2px var(--firefly-gold);
            animation: drift var(--d) infinite ease-in-out;
            opacity: 0;
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translate(var(--x), var(--y)); }
            80% { opacity: 1; }
        }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; width: 100%;
            background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--nv-green);
            display: flex; align-items: center; padding: 12px 40px; z-index: 1000;
            box-sizing: border-box;
        }
        .logo {
            width: 40px; height: 40px; border: 2px solid var(--nv-green);
            border-radius: 50%; background: radial-gradient(circle, #00ff41, #8e44ad);
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem;
            box-shadow: 0 0 10px var(--nv-green);
        }
        .header-text { margin-left: 15px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        /* --- FOUNDER PANEL (LEFT MIDDLE) --- */
        .founder-panel {
            position: fixed; top: 50%; left: 20px; 
            transform: translateY(-50%);
            width: 220px;
            background: #fff; border: 3px solid var(--nv-green);
            padding: 20px; color: #111; z-index: 500; font-size: 0.85rem;
            box-shadow: 10px 10px 0px rgba(0,255,65,0.2);
        }
        .profile-img { 
            width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--nv-green); 
            display: block; margin: 0 auto 15px; object-fit: cover; 
        }
        .control-btn {
            background: #000; color: #fff; width: 100%; border: none;
            padding: 8px; margin-top: 10px; cursor: pointer; font-size: 0.7rem;
            font-weight: bold; text-transform: uppercase;
        }
        .control-btn:hover { background: var(--nv-green); color: #000; }
        .filter-input { width: 100%; margin-top: 10px; padding: 5px; border: 1px solid #ccc; font-family: inherit; font-size: 0.7rem; }

        /* --- THE INFINITE LEDGER --- */
        .book-container {
            margin: 140px auto 120px 280px; 
            width: 60%; max-width: 850px;
            background: #fff; color: #111; padding: 40px;
            box-shadow: 0 0 40px rgba(0,255,65,0.1); border-radius: 2px;
            min-height: 80vh; position: relative;
        }
        .book-header { border-bottom: 2px solid #222; margin-bottom: 25px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        
        .pages-list { margin-top: 20px; }
        .saved-page { border-bottom: 1px dashed #ddd; padding: 50px 0; position: relative; background: #fff; min-height: 250px; }
        
        /* LOGO WATERMARK */
        .watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; border-radius: 50%;
            background: radial-gradient(circle, #00ff41, #8e44ad);
            opacity: 0.05; pointer-events: none; z-index: 0;
        }

        .page-actions { position: absolute; top: 20px; right: 0; z-index: 2; }
        .action-btn { background: #eee; border: 1px solid #ccc; padding: 8px 15px; cursor: pointer; font-size: 0.75rem; margin-left: 10px; font-weight: bold; }
        .action-btn:hover { background: #000; color: #fff; }

        .page-content { position: relative; z-index: 1; padding: 20px 0; line-height: 1.8; color: #222; font-size: 1.1rem; }
        .page-meta { font-size: 0.7rem; color: #bbb; margin-top: 20px; text-transform: uppercase; }

        /* --- FOOTER: FLOWING SEA --- */
        footer { position: fixed; bottom: 0; width: 100%; height: 50px; background: var(--sea-blue); z-index: 1000; overflow: hidden; }
        .sea-layer { width: 200%; height: 100%; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%231a5276" d="M0,192L48,176C96,160,192,128,288,144C384,160,480,224,576,218.7C672,213,768,139,864,128C960,117,1056,171,1152,181.3C1248,192,1344,160,1392,144L1440,128V320H0Z"></path></svg>'); animation: wave 12s linear infinite; }
        @keyframes wave { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    </style>
</head>
<body>

    <div class="bg-fixed" id="fireflyField">
        <img src="https://raw.githubusercontent.com/orion-pal/environmental-data/master/night_vision_tree.png" class="big-tree" alt="ROOT Tree">
    </div>

    <header>
        <div class="logo">🌌</div>
        <div class="header-text">ROOT and reclaim</div>
    </header>

    <div class="founder-panel">
        <img src="image_0.png" class="profile-img" alt="Founder SRK">
        <center><strong>FOUNDER SRK</strong></center>
        <p style="margin-top:10px; border-top:1px solid #eee; padding-top:10px; font-size: 0.7rem;">"Architect of the Root Archive."</p>
        
        <button class="control-btn" onclick="addNewPage()">+ Generate New Page</button>
        <input type="text" id="dateFilter" class="filter-input" placeholder="Filter by date (MM/DD/YYYY)..." onkeyup="renderLedger()">
        
        <button class="control-btn" onclick="exportJSON()">Export Archive (.json)</button>
        <button class="control-btn" onclick="document.getElementById('importFile').click()">Import Archive (.json)</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importJSON(event)">
        <button class="control-btn" style="background:#c0392b" onclick="resetBook()">Purge All Data</button>
    </div>

    <div class="book-container">
        <div class="book-header">
            <h2 style="margin:0">SRK UNLIMITED LEDGER</h2>
            <span id="pageCounter" style="font-weight:bold; font-size:0.9rem">PAGES: 0</span>
        </div>
        <div class="pages-list" id="ledgerList"></div>
    </div>

    <footer><div class="sea-layer"></div></footer>

    <script>
        // FIREFLIES
        const field = document.getElementById('fireflyField');
        for (let i = 0; i < 50; i++) {
            const ff = document.createElement('div');
            ff.className = 'firefly';
            ff.style.setProperty('--x', (Math.random() * 400 - 200) + 'px');
            ff.style.setProperty('--y', (Math.random() * -400 - 50) + 'px');
            ff.style.setProperty('--d', (Math.random() * 5 + 5) + 's');
            ff.style.left = Math.random() * 100 + '%';
            ff.style.top = Math.random() * 100 + '%';
            ff.style.animationDelay = Math.random() * 10 + 's';
            field.appendChild(ff);
        }

        // INFINITE LEDGER LOGIC
        let archive = JSON.parse(localStorage.getItem('srk_infinite_ledger')) || [];
        if (archive.length === 0) addNewPage(false);

        function addNewPage(shouldUpdate = true) {
            archive.push({
                id: Date.now() + Math.random(),
                title: `LOG ENTRY ${archive.length + 1}`,
                content: "[EMPTY WATERMARKED PAGE]",
                timestamp: "UNINITIALIZED",
                pageNumber: archive.length + 1
            });
            if(shouldUpdate) updateStorage();
        }

        function updateStorage() {
            localStorage.setItem('srk_infinite_ledger', JSON.stringify(archive));
            renderLedger();
        }

        function renderLedger() {
            const list = document.getElementById('ledgerList');
            const filter = document.getElementById('dateFilter').value.toLowerCase();
            document.getElementById('pageCounter').innerText = `PAGES: ${archive.length}`;
            list.innerHTML = ''; 

            archive.forEach((item) => {
                const isInit = item.timestamp !== "UNINITIALIZED";
                if (filter && !item.timestamp.toLowerCase().includes(filter)) return;

                list.innerHTML += `
                    <div class="saved-page">
                        <div class="watermark"></div>
                        <div class="page-actions">
                            <button class="action-btn" onclick="writePage(${item.id})">${isInit ? 'EDIT DATA' : 'WRITE IN PAGE'}</button>
                            ${isInit ? `<button class="action-btn" style="color:red" onclick="clearPage(${item.id})">PURGE</button>` : ''}
                        </div>
                        <h3 style="margin:0; position:relative; z-index:1;">Page ${item.pageNumber}: ${item.title}</h3>
                        <div class="page-content" style="white-space: pre-wrap;">${isInit ? item.content : `<span style="color:#ccc">Click 'Write in Page' to fill this entry.</span>`}</div>
                        <div class="page-meta">SYNCED: ${item.timestamp}</div>
                    </div>
                `;
            });
        }

        function writePage(id) {
            const item = archive.find(i => i.id === id);
            const current = item.timestamp === "UNINITIALIZED" ? "" : item.content;
            const updated = prompt(`Entry for Page ${item.pageNumber}:`, current);
            if (updated !== null && updated.trim() !== "") {
                item.content = updated;
                item.timestamp = new Date().toLocaleString();
                updateStorage();
            }
        }

        function clearPage(id) {
            if(confirm("Clear this page?")) {
                const item = archive.find(i => i.id === id);
                item.content = "[EMPTY WATERMARKED PAGE]";
                item.timestamp = "UNINITIALIZED";
                updateStorage();
            }
        }

        function resetBook() {
            if(confirm("🚨 Delete ALL pages and data?")) {
                localStorage.removeItem('srk_infinite_ledger');
                location.reload();
            }
        }

        function exportJSON() {
            const blob = new Blob([JSON.stringify(archive, null, 2)], { type: "application/json" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "SRK_INFINITE_ARCHIVE.json";
            link.click();
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    archive = JSON.parse(e.target.result);
                    updateStorage();
                    alert("Infinite Ledger Restored.");
                } catch (err) { alert("Invalid File."); }
            };
            reader.readAsText(file);
        }

        window.onload = renderLedger;
    </script>
</body>
</html>
