<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT | THE MEGA ARCHIVE</title>
    <style>
        :root { --nv-green: #00ff41; --paper: #fdfdfd; --ink: #111; }
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Consolas', monospace; overflow: hidden; height: 100vh; }
        
        /* BACKGROUND & FIREFLIES */
        .bg-fixed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 100%, rgba(0, 255, 65, 0.2) 0%, #000 90%); }
        .big-tree { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 70%; opacity: 0.4; filter: drop-shadow(0 0 20px var(--nv-green)); pointer-events: none; }
        .firefly { position: absolute; width: 4px; height: 4px; background: var(--nv-green); border-radius: 50%; box-shadow: 0 0 10px 4px var(--nv-green); animation: drift var(--d) infinite ease-in-out; }
        @keyframes drift { 0%, 100% { transform: translate(0,0); opacity:0; } 50% { transform: translate(var(--x), var(--y)); opacity:1; } }

        /* NAVIGATION TABS */
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--nv-green); z-index: 2000; display: flex; justify-content: center; gap: 10px; padding: 15px 0; }
        .tab-btn { background: none; border: 1px solid var(--nv-green); color: var(--nv-green); padding: 8px 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; }
        .tab-btn.active { background: var(--nv-green); color: #000; }

        /* 3D BOOK ENGINE */
        .book-wrapper { position: relative; width: 85vw; height: 75vh; margin: 120px auto 0; perspective: 2000px; display: none; }
        .book-wrapper.active { display: block; }
        .page { 
            position: absolute; width: 50%; height: 100%; right: 0; top: 0; 
            background: var(--paper); transform-origin: left; transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1); 
            transform-style: preserve-3d; border-left: 1px solid #ddd; padding: 30px; box-sizing: border-box; color: var(--ink); cursor: pointer; 
            box-shadow: inset 3px 0px 20px rgba(0,0,0,0.1);
        }
        .page.flipped { transform: rotateY(-180deg); }

        /* CONTENT & WATERMARK */
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; opacity: 0.05; pointer-events: none; }
        .content-wrap { height: 100%; display: flex; flex-direction: column; justify-content: space-between; position: relative; z-index: 5; }

        /* SOCIAL MEGA-BAR */
        .actions { border-top: 1px solid #ccc; padding-top: 10px; margin-top: auto; }
        .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; padding: 5px; background: #eee; border-radius: 5px; }
        .social-icon { width: 20px; height: 20px; cursor: pointer; transition: 0.3s; margin: 0 auto; filter: contrast(1.2); }
        .social-icon:hover { transform: scale(1.3) rotate(10deg); filter: drop-shadow(0 0 5px var(--nv-green)); }

        .btn-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .btn { background: var(--nv-green); border: none; padding: 5px 10px; font-weight: bold; cursor: pointer; font-size: 0.6rem; border-radius: 2px; }

        /* KISS ANIMATION */
        .kiss { position: absolute; font-size: 2.5rem; animation: floatUp 1s forwards; pointer-events: none; z-index: 5000; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>
    <div class="bg-fixed" id="field"><img src="https://raw.githubusercontent.com/orion-pal/environmental-data/master/night_vision_tree.png" class="big-tree"></div>

    <nav>
        <button class="tab-btn active" onclick="switchBook('bookTab', event)">The Book</button>
        <button class="tab-btn" onclick="switchBook('musicTab', event)">Music</button>
        <button class="tab-btn" onclick="switchBook('videoTab', event)">Video</button>
    </nav>

    <div id="bookTab" class="book-wrapper active"><div class="book" id="bookTarget"></div></div>
    <div id="musicTab" class="book-wrapper"><div class="book" id="musicTarget"></div></div>
    <div id="videoTab" class="book-wrapper"><div class="book" id="videoTarget"></div></div>

    <script>
        // FIREFLIES
        const fld = document.getElementById('field');
        for (let i = 0; i < 30; i++) {
            let f = document.createElement('div'); f.className = 'firefly';
            f.style.setProperty('--x', (Math.random() * 400 - 200) + 'px');
            f.style.setProperty('--y', (Math.random() * -400 - 50) + 'px');
            f.style.setProperty('--d', (Math.random() * 6 + 4) + 's');
            f.style.left = Math.random() * 100 + '%'; f.style.top = Math.random() * 100 + '%';
            fld.appendChild(f);
        }

        let db;
        // v34 Database Handshake
        const request = indexedDB.open("RootReclaimDB_v34", 1);

        request.onsuccess = (e) => { 
            db = e.target.result; 
            loadAll(); 
        };

        function switchBook(id, e) {
            document.querySelectorAll('.book-wrapper').forEach(w => w.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        function loadAll() {
            const tx = db.transaction("archive", "readonly");
            tx.objectStore("archive").getAll().onsuccess = (e) => {
                const data = e.target.result.sort((a,b) => b.id - a.id);
                
                // 1. Music Filter
                const musicData = data.filter(p => p.fType?.includes('audio'));
                
                // 2. Video Filter
                const videoData = data.filter(p => p.fType?.includes('video'));

                // 3. The Book Filter (Includes Text and Images)
                const bookData = data.filter(p => 
                    !p.dataType && 
                    !p.fType?.includes('audio') && 
                    !p.fType?.includes('video')
                );

                renderPages(bookData, 'bookTarget');
                renderPages(musicData, 'musicTarget');
                renderPages(videoData, 'videoTarget');
            };
        }

        function renderPages(items, targetId) {
            const target = document.getElementById(targetId);
            if(items.length === 0) {
                target.innerHTML = '<div class="page"><h3>EMPTY NODE</h3><p>Waiting for Founder SRK to sync data...</p></div>';
                return;
            }

            target.innerHTML = items.map((p, index) => `
                <div class="page" onclick="this.classList.toggle('flipped')" style="z-index: ${items.length - index}">
                    <img src="https://raw.githubusercontent.com/orion-pal/environmental-data/master/night_vision_tree.png" class="watermark">
                    <div class="content-wrap">
                        <div>
                            <small>NODE ID: ${p.id}</small>
                            <h3 style="margin:5px 0; color:var(--nv-green)">${p.fName || 'Data Packet'}</h3>
                            
                            ${p.fType?.includes('image') ? `<img src="${p.file}" style="max-width:100%; border:1px solid #ddd; margin-bottom:15px;">` : ''}
                            ${p.fType?.includes('audio') ? `<audio controls src="${p.file}" style="width:100%"></audio>` : ''}
                            ${p.fType?.includes('video') ? `<video controls src="${p.file}" style="width:100%"></video>` : ''}
                            
                            <p style="font-size:0.8rem; line-height:1.4;">${p.content}</p>
                        </div>
                        <div class="actions" onclick="event.stopPropagation()">
                            <div class="btn-row">
                                <button class="btn" onclick="kiss(event)">❤ LIKE</button>
                                <button class="btn" onclick="addComment(${p.id})">COMMENT</button>
                            </div>
                            <div class="social-grid">
                                <img src="https://cdn-icons-png.flaticon.com/512/3670/3670151.png" class="social-icon" onclick="share('tw')" title="X/Twitter">
                                <img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png" class="social-icon" onclick="share('fb')" title="Facebook">
                                <img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png" class="social-icon" onclick="share('wa')" title="WhatsApp">
                                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="social-icon" onclick="share('tg')" title="Telegram">
                                <img src="https://cdn-icons-png.flaticon.com/512/3955/3955024.png" class="social-icon" onclick="share('ig')" title="Instagram">
                                <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="social-icon" onclick="share('tk')" title="TikTok">
                                <img src="https://cdn-icons-png.flaticon.com/512/145/145808.png" class="social-icon" onclick="share('pi')" title="Pinterest">
                                <img src="https://cdn-icons-png.flaticon.com/512/1617/1617469.png" class="social-icon" onclick="share('cp')" title="Copy Link">
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addComment(id) {
            const msg = prompt("Message for Founder:"); 
            if(!msg) return;
            const tx = db.transaction("archive", "readwrite");
            const store = tx.objectStore("archive");
            store.get(id).onsuccess = (e) => {
                const d = e.target.result; 
                if(!d.comments) d.comments = [];
                d.comments.push({ text: msg, isNew: true }); 
                store.put(d);
                tx.oncomplete = () => alert("Sent!");
            };
        }

        function kiss(e) {
            const k = document.createElement('div'); k.className = 'kiss'; k.innerText = '💋';
            k.style.left = e.pageX + 'px'; k.style.top = e.pageY + 'px';
            document.body.appendChild(k); setTimeout(() => k.remove(), 1000);
        }

        function share(plat) {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent("ROOT ARCHIVE: New Data Reclaimed!");
            const apps = {
                wa: `https://api.whatsapp.com/send?text=${text}%20${url}`,
                fb: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
                tw: `https://twitter.com/intent/tweet?url=${url}&text=${text}`,
                tg: `https://t.me/share/url?url=${url}&text=${text}`,
                pi: `https://pinterest.com/pin/create/button/?url=${url}&description=${text}`,
                ig: `https://www.instagram.com/`, 
                tk: `https://www.tiktok.com/`,
                cp: `copy`
            };
            if(apps[plat] === 'copy') { navigator.clipboard.writeText(window.location.href); alert("Link Copied!"); }
            else { window.open(apps[plat]); }
        }
    </script>
</body>
</html>
