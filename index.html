<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT and reclaim | Public Archive</title>
    <style>
        :root { --nv-green: #00ff41; --firefly-green: rgba(0, 255, 65, 0.9); --paper-color: #fdfdfd; }
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Consolas', monospace; color: #fff; overflow-x: hidden; }
        .bg-fixed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 100%, rgba(0, 255, 65, 0.2) 0%, #000 90%); }
        .big-tree { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 80%; opacity: 0.6; filter: drop-shadow(0 0 20px var(--nv-green)); }
        .firefly { position: absolute; width: 5px; height: 5px; background: var(--firefly-green); border-radius: 50%; box-shadow: 0 0 15px 6px var(--firefly-green); animation: drift var(--d) infinite ease-in-out; }
        @keyframes drift { 0%, 100% { transform: translate(0,0); opacity:0; } 50% { transform: translate(var(--x), var(--y)); opacity:1; } }

        /* FOUNDER PANEL (PUBLIC) */
        .founder-panel { position: fixed; top: 80px; left: 10px; width: 200px; background: var(--paper-color); border: 2px solid #333; padding: 15px; color: #111; z-index: 500; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--nv-green); display: block; margin: 0 auto 10px; object-fit: cover; }
        
        /* THE BOOK */
        .book-stack { margin: 100px auto 100px 230px; width: 65%; display: flex; flex-direction: column; gap: 50px; }
        .paper-sheet { background: var(--paper-color); background-image: linear-gradient(#e5e5e5 1px, transparent 1px); background-size: 100% 2.2rem; color: #111; padding: 40px; min-height: 500px; position: relative; box-shadow: 5px 5px 15px rgba(0,0,0,0.3); border-left: 8px solid #bbb; }
        .media-node { background: #1a1a1a; color: var(--nv-green); padding: 15px; border-radius: 5px; margin: 20px 0; text-align: center; }
        .btn { background: var(--nv-green); border: none; padding: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="bg-fixed" id="field"><img src="https://raw.githubusercontent.com/orion-pal/environmental-data/master/night_vision_tree.png" class="big-tree"></div>
    
    <div class="founder-panel">
        <img src="image_0.png" class="profile-img">
        <center><strong>FOUNDER SRK</strong></center>
        <p style="font-size: 0.7rem; margin-top: 10px; border-top: 1px solid #ccc; padding-top: 10px;"><strong>About:</strong> Architect of ROOT. documenting resilience and industrial decay.</p>
    </div>

    <div class="book-stack" id="bookStack"></div>

    <script>
        // ANIMATION
        const fld = document.getElementById('field');
        for (let i = 0; i < 35; i++) {
            let f = document.createElement('div'); f.className = 'firefly';
            f.style.setProperty('--x', (Math.random() * 400 - 200) + 'px');
            f.style.setProperty('--y', (Math.random() * -400 - 50) + 'px');
            f.style.setProperty('--d', (Math.random() * 6 + 4) + 's');
            f.style.left = Math.random() * 100 + '%'; f.style.top = Math.random() * 100 + '%';
            fld.appendChild(f);
        }

        // SYNCED DATABASE v20
        let db;
        const request = indexedDB.open("RootReclaimDB_v20", 1);
        request.onsuccess = (e) => { db = e.target.result; render(); };

        function render() {
            const stack = document.getElementById('bookStack');
            const tx = db.transaction("archive", "readonly");
            tx.objectStore("archive").getAll().onsuccess = (e) => {
                const pages = e.target.result.sort((a,b) => b.id - a.id);
                stack.innerHTML = pages.map((p, i) => `
                    <div class="paper-sheet">
                        <h2>LOG: ${pages.length - i}</h2>
                        ${p.fType?.includes('audio') ? `<div class="media-node">🎵 ${p.fName}<audio controls src="${p.file}" style="width:100%"></audio></div>` : ''}
                        ${p.fType?.includes('video') ? `<div class="media-node"><video controls src="${p.file}" style="width:100%"></video></div>` : ''}
                        ${p.fType?.includes('image') ? `<img src="${p.file}" style="max-width:100%; border:1px solid #000;">` : ''}
                        <div style="font-size:1.1rem; line-height:2.2rem; white-space:pre-wrap; color:#111;">${p.content}</div>
                        <button class="btn" onclick="dl('${p.file}','${p.fName}')">DOWNLOAD DATA</button>
                    </div>`).join('');
            };
        }
        function dl(s, n) { const a = document.createElement('a'); a.href = s; a.download = n; a.click(); }
    </script>
</body>
</html>
