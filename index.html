<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT and reclaim | Public Archive</title>
    <style>
        :root { --nv-green: #00ff41; --firefly-green: rgba(0, 255, 65, 0.9); --paper-color: #fdfdfd; }
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Consolas', monospace; color: #fff; overflow-x: hidden; }
        
        /* BACKGROUND & ANIMATION */
        .bg-fixed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 100%, rgba(0, 255, 65, 0.2) 0%, #000 90%); }
        .big-tree { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 85%; max-width: 800px; opacity: 0.6; filter: drop-shadow(0 0 20px var(--nv-green)); pointer-events: none; }
        .firefly { position: absolute; width: 4px; height: 4px; background: var(--firefly-green); border-radius: 50%; box-shadow: 0 0 12px 5px var(--firefly-green); animation: drift var(--d) infinite ease-in-out; }
        @keyframes drift { 0%, 100% { transform: translate(0,0); opacity:0; } 50% { transform: translate(var(--x), var(--y)); opacity:1; } }

        /* FOUNDER PROFILE (TOP LEFT) */
        .founder-panel { position: fixed; top: 80px; left: 15px; width: 210px; background: var(--paper-color); border: 2px solid #333; padding: 20px; color: #111; z-index: 500; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--nv-green); display: block; margin: 0 auto 10px; object-fit: cover; }
        .about-me { font-size: 0.75rem; line-height: 1.4; border-top: 1px solid #ccc; padding-top: 10px; margin-top: 10px; }

        /* THE PAPER BOOK */
        .book-stack { margin: 120px auto 100px 250px; width: 60%; display: flex; flex-direction: column; gap: 60px; }
        .paper-sheet { background: var(--paper-color); background-image: linear-gradient(#e5e5e5 1px, transparent 1px); background-size: 100% 2.2rem; color: #111; padding: 60px; min-height: 600px; position: relative; box-shadow: 5px 5px 15px rgba(0,0,0,0.4); border-left: 10px solid #bbb; }
        
        /* MULTIMEDIA NODES */
        .media-box { background: #111; color: var(--nv-green); padding: 20px; border-radius: 5px; margin: 25px 0; text-align: center; border: 1px solid #333; }
        img, video { max-width: 100%; border: 1px solid #000; display: block; margin: 0 auto; }
        .dl-btn { background: var(--nv-green); color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; font-family: inherit; }
    </style>
</head>
<body>
    <div class="bg-fixed" id="field"><img src="https://raw.githubusercontent.com/orion-pal/environmental-data/master/night_vision_tree.png" class="big-tree"></div>

    <div class="founder-panel">
        <img src="image_0.png" class="profile-img">
        <center><strong>FOUNDER SRK</strong></center>
        <div class="about-me">
            <strong>About Me:</strong> Architect of ROOT. documenting nature's resilience and industrial decay through a high-capacity reclaim archive.
        </div>
    </div>

    <div class="book-stack" id="bookStack"></div>

    <script>
        // ANIMATION: GREEN FIREFLIES
        const fld = document.getElementById('field');
        for (let i = 0; i < 40; i++) {
            let f = document.createElement('div'); f.className = 'firefly';
            f.style.setProperty('--x', (Math.random() * 400 - 200) + 'px');
            f.style.setProperty('--y', (Math.random() * -500 - 50) + 'px');
            f.style.setProperty('--d', (Math.random() * 6 + 4) + 's');
            f.style.left = Math.random() * 100 + '%'; f.style.top = Math.random() * 100 + '%';
            fld.appendChild(f);
        }

        // DATABASE SYNC (v22)
        let db;
        const request = indexedDB.open("RootReclaimDB_v22", 1);
        request.onupgradeneeded = (e) => { e.target.result.createObjectStore("archive", { keyPath: "id" }); };
        request.onsuccess = (e) => { db = e.target.result; renderArchive(); };

        function renderArchive() {
            const stack = document.getElementById('bookStack');
            const tx = db.transaction("archive", "readonly");
            tx.objectStore("archive").getAll().onsuccess = (e) => {
                const pages = e.target.result.sort((a,b) => b.id - a.id);
                if(pages.length === 0) {
                    stack.innerHTML = '<div class="paper-sheet"><h2>ARCHIVE EMPTY</h2><p>Waiting for data synchronization from Founder SRK.</p></div>';
                    return;
                }
                stack.innerHTML = pages.map((p, i) => `
                    <div class="paper-sheet">
                        <h2>LOG: ${pages.length - i}</h2>
                        ${p.fType?.includes('audio') ? `<div class="media-box">🎵 TRACK: ${p.fName}<audio controls src="${p.file}" style="width:100%; margin-top:10px;"></audio></div>` : ''}
                        ${p.fType?.includes('video') ? `<div class="media-box"><video controls src="${p.file}" style="width:100%"></video></div>` : ''}
                        ${p.fType?.includes('image') ? `<img src="${p.file}" style="margin:20px auto;">` : ''}
                        <div style="font-size:1.15rem; line-height:2.2rem; white-space:pre-wrap; color:#111;">${p.content}</div>
                        <button class="dl-btn" onclick="dl('${p.file}','${p.fName}')">DOWNLOAD DATA PACKET</button>
                    </div>`).join('');
            };
        }
        function dl(s, n) { const a = document.createElement('a'); a.href = s; a.download = n; a.click(); }
    </script>
</body>
</html>
