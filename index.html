<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ROOT and reclaim | Public Archive</title>
    <style>
        :root { --nv-green: #00ff41; --firefly-green: rgba(0, 255, 65, 0.9); --paper-color: #fdfdfd; }
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Consolas', monospace; color: #fff; overflow-x: hidden; }
        .bg-fixed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 100%, rgba(0, 255, 65, 0.2) 0%, #000 90%); }
        .big-tree { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 80%; opacity: 0.6; filter: drop-shadow(0 0 20px var(--nv-green)); }
        .firefly { position: absolute; width: 5px; height: 5px; background: var(--firefly-green); border-radius: 50%; box-shadow: 0 0 15px 6px var(--firefly-green); animation: drift var(--d) infinite ease-in-out; }
        @keyframes drift { 0%, 100% { transform: translate(0,0); opacity:0; } 50% { transform: translate(var(--x), var(--y)); opacity:1; } }

        /* PUBLIC FOUNDER PANEL (TOP LEFT) */
        .founder-panel { position: fixed; top: 100px; left: 20px; width: 230px; background: var(--paper-color); border: 3px solid #333; padding: 20px; color: #111; z-index: 500; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--nv-green); display: block; margin: 0 auto 15px; object-fit: cover; }
        
        .book-stack { margin: 120px auto 150px 300px; width: 60%; display: flex; flex-direction: column; gap: 70px; }
        .paper-sheet { background: var(--paper-color); color: #111; padding: 60px; min-height: 600px; position: relative; box-shadow: 3px 3px 15px rgba(0,0,0,0.3), 10px 10px 0px #ddd; border-left: 10px solid #bbb; }
        .media-node { background: #1a1a1a; color: var(--nv-green); padding: 20px; border-radius: 8px; margin: 20px 0; text-align: center; }
        .btn { background: var(--nv-green); border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="bg-fixed" id="field"><img src="https://raw.githubusercontent.com/orion-pal/environmental-data/master/night_vision_tree.png" class="big-tree"></div>
    
    <div class="founder-panel">
        <img src="image_0.png" class="profile-img">
        <center><strong>FOUNDER SRK</strong></center>
        <p style="font-size: 0.8rem; margin-top: 10px; border-top: 1px solid #ccc; padding-top: 10px;">
            <strong>About Me:</strong> Architect of the Root system. I document industrial decay and the resilience of nature. This archive is an unlimited record of reclaim data.
        </p>
    </div>

    <div class="book-stack" id="bookStack"></div>

    <script>
        // FIREFLIES
        const fld = document.getElementById('field');
        for (let i = 0; i < 40; i++) {
            let f = document.createElement('div'); f.className = 'firefly';
            f.style.setProperty('--x', (Math.random() * 400 - 200) + 'px');
            f.style.setProperty('--y', (Math.random() * -400 - 50) + 'px');
            f.style.setProperty('--d', (Math.random() * 6 + 4) + 's');
            f.style.left = Math.random() * 100 + '%'; f.style.top = Math.random() * 100 + '%';
            fld.appendChild(f);
        }

        // DATABASE LOAD
        let db;
        const request = indexedDB.open("RootReclaimDB", 1);
        request.onsuccess = (e) => { db = e.target.result; render(); };

        function render() {
            const stack = document.getElementById('bookStack');
            const tx = db.transaction("pages", "readonly");
            tx.objectStore("pages").getAll().onsuccess = (e) => {
                const pages = e.target.result.sort((a,b) => a.id - b.id);
                stack.innerHTML = pages.map((p, i) => `
                    <div class="paper-sheet">
                        <h2>LOG ENTRY: ${i+1}</h2>
                        ${p.fileType?.includes('audio') ? `<div class="media-node"><audio controls src="${p.file}" style="width:100%"></audio></div>` : ''}
                        ${p.fileType?.includes('video') ? `<div class="media-node"><video controls src="${p.file}" style="width:100%"></video></div>` : ''}
                        ${p.fileType?.includes('image') ? `<img src="${p.file}" style="max-width:100%; border:2px solid #000;">` : ''}
                        <div style="font-size:1.1rem; line-height:2.2rem; white-space:pre-wrap; margin-top:20px;">${p.content}</div>
                        <button class="btn" onclick="dl('${p.file}','${p.fileName}')">DOWNLOAD DATA</button>
                    </div>`).join('');
            };
        }
        function dl(s, n) { const a = document.createElement('a'); a.href = s; a.download = n; a.click(); }
    </script>
</body>
</html>
