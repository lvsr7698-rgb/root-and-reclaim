<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT | Founder Command v22</title>
    <style>
        :root { --nv-green: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--nv-green); font-family: sans-serif; padding: 15px; margin: 0; }
        .panel { border: 2px solid var(--nv-green); padding: 15px; background: #111; }
        
        /* PROGRESS BAR */
        #progressContainer { width: 100%; background: #222; height: 15px; border: 1px solid var(--nv-green); margin: 15px 0; display: none; }
        #progressBar { width: 0%; height: 100%; background: var(--nv-green); transition: width 0.1s; }

        .btn-stack { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn { padding: 20px; background: var(--nv-green); color: #000; font-weight: bold; border: none; text-transform: uppercase; font-size: 1rem; border-radius: 4px; cursor: pointer; }
        .btn-blue { background: #3498db; color: #fff; }
        
        .card { background: #000; border: 2px solid #333; margin-top: 25px; padding: 20px; border-left: 10px solid var(--nv-green); }
        textarea { width: 100%; height: 180px; background: #111; color: #fff; border: 1px solid var(--nv-green); margin: 15px 0; padding: 10px; box-sizing: border-box; font-size: 1rem; }
        .save-btn { background: #fff; color: #000; padding: 20px; width: 100%; font-weight: bold; font-size: 1.2rem; border: none; margin-top: 10px; box-shadow: 0 0 15px var(--nv-green); cursor: pointer; }
    </style>
</head>
<body>
    <div class="panel">
        <h2 style="margin:0;">FOUNDER COMMAND v22</h2>
        <div id="status" style="text-align:center; font-family:monospace; margin-top:10px;">SYSTEM READY</div>
        
        <div id="progressContainer"><div id="progressBar"></div></div>

        <div class="btn-stack">
            <button class="btn" onclick="addPage()">+ CREATE NEW BOOK PAGE</button>
            <button class="btn btn-blue" onclick="document.getElementById('fileIn').click()">📂 UPLOAD MUSIC / VIDEO / IMAGE</button>
            <input type="file" id="fileIn" style="display:none" onchange="handleUpload(event)">
        </div>

        <div id="adminList"></div>
    </div>

    <script>
        let db;
        const request = indexedDB.open("RootReclaimDB_v22", 1);
        request.onupgradeneeded = (e) => { e.target.result.createObjectStore("archive", { keyPath: "id" }); };
        request.onsuccess = (e) => { db = e.target.result; render(); };

        function handleUpload(e) {
            const file = e.target.files[0]; if(!file) return;
            const bar = document.getElementById('progressBar');
            const container = document.getElementById('progressContainer');
            const status = document.getElementById('status');
            
            container.style.display = 'block';
            status.innerText = "UPLOADING " + file.name.toUpperCase();
            status.style.color = "yellow";

            const reader = new FileReader();
            reader.onprogress = (d) => { if(d.lengthComputable) bar.style.width = (d.loaded/d.total)*100 + '%'; };
            reader.onload = (ev) => {
                const entry = { id: Date.now(), content: "Entry for " + file.name, file: ev.target.result, fName: file.name, fType: file.type };
                const tx = db.transaction("archive", "readwrite");
                tx.objectStore("archive").add(entry);
                tx.oncomplete = () => { 
                    status.innerText = "UPLOAD SUCCESSFUL";
                    status.style.color = "#00ff41"; 
                    container.style.display = 'none'; 
                    render(); 
                };
            };
            reader.readAsDataURL(file);
        }

        function render() {
            const list = document.getElementById('adminList');
            const tx = db.transaction("archive", "readonly");
            tx.objectStore("archive").getAll().onsuccess = (e) => {
                const items = e.target.result.sort((a,b) => b.id - a.id);
                list.innerHTML = items.map(p => `
                    <div class="card">
                        <h3 style="color:#fff; margin-top:0;">${p.fName || 'Text Entry'}</h3>
                        ${p.fType?.includes('audio') ? `<audio controls src="${p.file}" style="width:100%"></audio>` : ''}
                        ${p.fType?.includes('video') ? `<video controls src="${p.file}" style="width:100%"></video>` : ''}
                        ${p.fType?.includes('image') ? `<img src="${p.file}" style="width:100%; border:1px solid var(--nv-green);">` : ''}
                        <textarea id="area-${p.id}">${p.content}</textarea>
                        <button class="save-btn" onclick="saveData(${p.id})">SAVE & PUBLISH</button>
                        <button onclick="delPage(${p.id})" style="color:red; background:none; border:none; width:100%; margin-top:15px; cursor:pointer;">[DELETE]</button>
                    </div>`).join('');
            };
        }

        function addPage() {
            const entry = { id: Date.now(), content: "", file: null, fName: "", fType: "" };
            const tx = db.transaction("archive", "readwrite");
            tx.objectStore("archive").add(entry);
            tx.oncomplete = render;
        }

        function saveData(id) {
            const text = document.getElementById(`area-${id}`).value;
            const tx = db.transaction("archive", "readwrite");
            const store = tx.objectStore("archive");
            store.get(id).onsuccess = (e) => {
                const data = e.target.result; data.content = text; store.put(data);
                tx.oncomplete = () => alert("DATA PUBLISHED TO INDEX.HTML");
            };
        }

        function delPage(id) { if(confirm("Delete this entry?")) { const tx = db.transaction("archive", "readwrite"); tx.objectStore("archive").delete(id); tx.oncomplete = render; } }
    </script>
</body>
</html>
