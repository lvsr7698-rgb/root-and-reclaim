<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ROOT | FOUNDER COMMAND CENTER</title>
    <style>
        :root { --nv-green: #00ff41; --bg-dark: #0a0a0a; --panel-bg: #1a1a1a; }
        body { background: var(--bg-dark); color: var(--nv-green); font-family: 'Consolas', monospace; padding: 40px; margin: 0; }
        
        .dashboard { max-width: 1000px; margin: 0 auto; background: var(--panel-bg); border: 2px solid var(--nv-green); padding: 30px; box-shadow: 0 0 30px rgba(0,255,65,0.2); }
        h1 { border-bottom: 2px solid var(--nv-green); padding-bottom: 15px; text-transform: uppercase; letter-spacing: 3px; }

        /* UPLOAD SECTION */
        .upload-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; background: #222; padding: 20px; border: 1px dashed var(--nv-green); }
        .zone-label { font-size: 0.8rem; margin-bottom: 10px; display: block; color: #aaa; }
        
        /* ACTION BUTTONS */
        .btn { padding: 12px 20px; background: var(--nv-green); color: #000; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-right: 10px; }
        .btn:hover { background: #fff; box-shadow: 0 0 15px var(--nv-green); }
        .btn-del { background: #ff3131; color: #fff; }

        /* LIVE PREVIEW LIST */
        .admin-list { margin-top: 50px; }
        .page-card { background: #111; border-left: 5px solid var(--nv-green); padding: 25px; margin-bottom: 30px; position: relative; }
        .status-tag { position: absolute; top: 10px; right: 10px; font-size: 0.6rem; color: #888; }
        
        textarea { width: 100%; height: 150px; background: #000; color: #fff; border: 1px solid #444; padding: 15px; font-family: inherit; font-size: 1rem; margin: 15px 0; outline: none; }
        textarea:focus { border-color: var(--nv-green); }

        .media-preview { background: #000; border: 1px solid #333; padding: 10px; margin: 10px 0; text-align: center; }
        video, audio, img { max-width: 100%; max-height: 200px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Founder Command Center</h1>
        <p style="color: #888;">Logged in as: <strong>Founder SRK</strong> | Archive: ROOT and reclaim</p>

        <div class="upload-zone">
            <div>
                <span class="zone-label">STEP 1: INITIALIZE NEW DATA PACKET</span>
                <button class="btn" onclick="addBlankPage()">+ Create Empty Book Page</button>
            </div>
            <div>
                <span class="zone-label">STEP 2: IMPORT MULTIMEDIA (ANY SIZE/FORMAT)</span>
                <input type="file" id="masterUpload" style="display:none" onchange="handleMasterUpload(event)">
                <button class="btn" style="background: #3498db; color: #fff;" onclick="document.getElementById('masterUpload').click()">📂 Upload Music / Video / Image</button>
            </div>
        </div>

        <div class="admin-list" id="adminList">
            </div>
    </div>

    <script>
        let db;
        // OPEN DATABASE (Shared with index.html)
        const request = indexedDB.open("RootReclaimDB", 1);
        
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("pages")) {
                db.createObjectStore("pages", { keyPath: "id" });
            }
        };

        request.onsuccess = (e) => {
            db = e.target.result;
            renderAdminPortal();
        };

        // --- CORE ADMIN FUNCTIONS ---

        // 1. CREATE EMPTY PAGE
        function addBlankPage() {
            const newPage = {
                id: Date.now(),
                content: "Enter your analysis for this reclaim packet here...",
                file: null,
                fileName: "",
                fileType: "",
                likes: 0,
                comments: [],
                isEdit: true
            };
            const tx = db.transaction("pages", "readwrite");
            tx.objectStore("pages").add(newPage);
            tx.oncomplete = renderAdminPortal;
        }

        // 2. UNIVERSAL UPLOAD (Music, Video, Image, Any Size)
        function handleMasterUpload(e) {
            const file = e.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                const mediaPage = {
                    id: Date.now(),
                    content: "Analysis for: " + file.name,
                    file: ev.target.result,
                    fileName: file.name,
                    fileType: file.type,
                    likes: 0,
                    comments: [],
                    isEdit: true
                };
                const tx = db.transaction("pages", "readwrite");
                tx.objectStore("pages").add(mediaPage);
                tx.oncomplete = () => {
                    alert("Media Synchronized with Archive.");
                    renderAdminPortal();
                };
            };
            reader.readAsDataURL(file);
        }

        // 3. RENDER THE PORTAL
        function renderAdminPortal() {
            const list = document.getElementById('adminList');
            const tx = db.transaction("pages", "readonly");
            const store = tx.objectStore("pages");

            store.getAll().onsuccess = (e) => {
                const pages = e.target.result.sort((a,b) => b.id - a.id); // Newest first
                list.innerHTML = pages.map(p => `
                    <div class="page-card">
                        <span class="status-tag">PACKET ID: ${p.id}</span>
                        <h3 style="margin-top:0;">DATA NODE: ${p.fileName || 'Text Only'}</h3>
                        
                        ${renderMediaPreview(p)}

                        <textarea id="edit-${p.id}">${p.content}</textarea>

                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <button class="btn" onclick="saveData(${p.id})">Save to Public Site</button>
                                <button class="btn btn-del" onclick="deleteData(${p.id})">Purge from Archive</button>
                            </div>
                            <div style="color:#666; font-size:0.7rem;">Comments: ${p.comments.length} | Likes: ${p.likes}</div>
                        </div>
                    </div>
                `).join('');
            };
        }

        // MEDIA PREVIEW LOGIC
        function renderMediaPreview(p) {
            if(!p.file) return '<div class="media-preview">[No Media Attached]</div>';
            if(p.fileType.includes('image')) return `<div class="media-preview"><img src="${p.file}"></div>`;
            if(p.fileType.includes('audio')) return `<div class="media-preview"><audio controls src="${p.file}"></audio></div>`;
            if(p.fileType.includes('video')) return `<div class="media-preview"><video controls src="${p.file}"></video></div>`;
            return `<div class="media-preview">Document Attached: ${p.fileName}</div>`;
        }

        // 4. SAVE & DELETE
        function saveData(id) {
            const text = document.getElementById(`edit-${id}`).value;
            const tx = db.transaction("pages", "readwrite");
            const store = tx.objectStore("pages");
            store.get(id).onsuccess = (e) => {
                const data = e.target.result;
                data.content = text;
                store.put(data);
                tx.oncomplete = () => alert("Public Archive Updated Successfully.");
            };
        }

        function deleteData(id) {
            if(confirm("DANGER: Permanently purge this packet from the public site?")) {
                const tx = db.transaction("pages", "readwrite");
                tx.objectStore("pages").delete(id);
                tx.oncomplete = renderAdminPortal;
            }
        }
    </script>
</body>
</html>
