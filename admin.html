<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT | FOUNDER COMMAND v21</title>
    <style>
        :root { --nv-green: #00ff41; --bg-dark: #050505; }
        body { background: var(--bg-dark); color: var(--nv-green); font-family: sans-serif; padding: 15px; margin: 0; }
        .dashboard { border: 2px solid var(--nv-green); padding: 15px; background: #111; }
        
        /* PROGRESS BAR */
        #progressContainer { width: 100%; background: #222; height: 20px; border: 1px solid var(--nv-green); margin: 15px 0; display: none; }
        #progressBar { width: 0%; height: 100%; background: var(--nv-green); transition: width 0.1s; }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn { padding: 20px; background: var(--nv-green); color: #000; font-weight: bold; border: none; text-transform: uppercase; font-size: 1rem; border-radius: 5px; cursor: pointer; }
        .btn-blue { background: #3498db; color: #fff; }
        
        #dbStatus { background: #222; padding: 10px; border: 1px solid var(--nv-green); margin: 10px 0; font-family: monospace; font-size: 0.8rem; text-align: center; }

        .page-card { background: #000; border: 2px solid #333; margin-top: 20px; padding: 20px; border-left: 10px solid var(--nv-green); }
        textarea { width: 100%; height: 150px; background: #111; color: #fff; border: 1px solid var(--nv-green); margin: 15px 0; padding: 10px; box-sizing: border-box; font-size: 1rem; }
        
        .master-save-btn { background: #fff; color: #000; padding: 20px; width: 100%; font-weight: bold; font-size: 1.2rem; border: none; margin-top: 10px; box-shadow: 0 0 15px var(--nv-green); cursor: pointer; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2 style="margin-top:0;">FOUNDER COMMAND v21</h2>
        <div id="dbStatus">SYSTEM READY</div>

        <div id="progressContainer"><div id="progressBar"></div></div>

        <div class="controls">
            <button class="btn" onclick="addTextPage()">+ CREATE TEXT PAGE</button>
            <button class="btn btn-blue" onclick="document.getElementById('mobileIn').click()">📂 UPLOAD MUSIC/VIDEO/IMAGE</button>
            <input type="file" id="mobileIn" style="display:none" onchange="handleMobileUpload(event)">
        </div>

        <div id="adminList"></div>
    </div>

    <script>
        let db;
        const dbName = "RootReclaimDB_v20"; // Keeping v20 to match your index.html

        const request = indexedDB.open(dbName, 1);
        request.onsuccess = (e) => { db = e.target.result; render(); };

        function handleMobileUpload(e) {
            const file = e.target.files[0];
            if(!file) return;

            const container = document.getElementById('progressContainer');
            const bar = document.getElementById('progressBar');
            const status = document.getElementById('dbStatus');

            container.style.display = 'block';
            status.innerText = "READING FILE...";
            status.style.color = "yellow";

            const reader = new FileReader();

            // This tracks the actual upload progress
            reader.onprogress = (data) => {
                if (data.lengthComputable) {
                    const progress = (data.loaded / data.total) * 100;
                    bar.style.width = progress + '%';
                }
            };

            reader.onload = (ev) => {
                status.innerText = "WRITING TO DATABASE...";
                const entry = { id: Date.now(), content: "Analysis for " + file.name, file: ev.target.result, fName: file.name, fType: file.type, likes: 0 };
                
                const tx = db.transaction("archive", "readwrite");
                tx.objectStore("archive").add(entry);
                
                tx.oncomplete = () => {
                    status.innerText = "SUCCESS: " + file.name;
                    status.style.color = "#00ff41";
                    container.style.display = 'none';
                    bar.style.width = '0%';
                    render();
                };
            };
            reader.readAsDataURL(file);
        }

        // Rest of the functions (addTextPage, render, saveData, deletePage) stay exactly as they were in v20
        function addTextPage() {
            const entry = { id: Date.now(), content: "", file: null, fName: "", fType: "", likes: 0 };
            const tx = db.transaction("archive", "readwrite");
            tx.objectStore("archive").add(entry);
            tx.oncomplete = render;
        }

        function render() {
            const list = document.getElementById('adminList');
            const tx = db.transaction("archive", "readonly");
            tx.objectStore("archive").getAll().onsuccess = (e) => {
                const items = e.target.result.sort((a,b) => b.id - a.id);
                list.innerHTML = items.map(p => `
                    <div class="page-card">
                        <small>ID: ${p.id}</small>
                        <h3 style="color:#fff">${p.fName || 'New Text Log'}</h3>
                        ${p.fType?.includes('audio') ? `<audio controls src="${p.file}" style="width:100%"></audio>` : ''}
                        ${p.fType?.includes('video') ? `<video controls src="${p.file}" style="width:100%"></video>` : ''}
                        ${p.fType?.includes('image') ? `<img src="${p.file}" style="width:100%; border:1px solid #00ff41;">` : ''}
                        <textarea id="area-${p.id}">${p.content}</textarea>
                        <button class="master-save-btn" onclick="saveData(${p.id})">SAVE & PUBLISH</button>
                        <button onclick="deletePage(${p.id})" style="background:none; border:none; color:red; margin-top:15px; width:100%; cursor:pointer;">[DELETE PAGE]</button>
                    </div>`).join('');
            };
        }

        function saveData(id) {
            const text = document.getElementById(`area-${id}`).value;
            const tx = db.transaction("archive", "readwrite");
            const store = tx.objectStore("archive");
            store.get(id).onsuccess = (e) => {
                const data = e.target.result;
                data.content = text;
                store.put(data);
                tx.oncomplete = () => alert("PUBLISHED TO INDEX.HTML");
            };
        }

        function deletePage(id) {
            if(confirm("Delete?")) {
                const tx = db.transaction("archive", "readwrite");
                tx.objectStore("archive").delete(id);
                tx.oncomplete = render;
            }
        }
    </script>
</body>
</html>
