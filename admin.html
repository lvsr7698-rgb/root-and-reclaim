<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT | FOUNDER v26</title>
    <style>

<script>
    // ... (Keep existing DB and Upload logic) ...

    function render() {
        const list = document.getElementById('adminList');
        const vList = document.getElementById('visitList');
        const bell = document.getElementById('notifyBell');
        
        const tx = db.transaction("archive", "readonly");
        tx.objectStore("archive").getAll().onsuccess = (e) => {
            const allData = e.target.result;
            
            // 1. ANALYSE VISITOR DATA
            const visits = allData.filter(d => d.type === "visit");
            vList.innerHTML = visits.map(v => `<div>[${v.time}] Visitor via ${v.platform}</div>`).join('');

            // 2. CHECK FOR NOTIFICATIONS (Unread comments)
            const hasNew = allData.some(p => p.comments && p.comments.some(c => c.founderNotify));
            bell.style.display = hasNew ? 'block' : 'none';

            // 3. RENDER CONTENT CARDS
            list.innerHTML = allData.filter(p => p.id && !p.type).map(p => `
                <div class="card">
                    <strong>${p.fName || 'Text Log'}</strong>
                    <div style="color:yellow; font-size:0.7rem;">Comments: ${(p.comments || []).length}</div>
                    <textarea id="edit-${p.id}">${p.content}</textarea>
                    <button class="btn" onclick="save(${p.id})">SAVE & CLEAR NOTIFY</button>
                </div>`).join('');
        };
    }

    function save(id) {
        const tx = db.transaction("archive", "readwrite");
        const store = tx.objectStore("archive");
        store.get(id).onsuccess = (e) => {
            const data = e.target.result;
            data.content = document.getElementById(`edit-${id}`).value;
            // Clear notifications for this page
            if(data.comments) data.comments.forEach(c => c.founderNotify = false);
            store.put(data);
            tx.oncomplete = () => { alert("Updated & Notifications Cleared"); render(); };
        };
    }
</script>

        body { background: #0a0a0a; color: #00ff41; font-family: monospace; padding: 20px; }
        .panel { border: 2px solid #00ff41; padding: 20px; background: #111; max-width: 600px; margin: 0 auto; }
        .btn { width: 100%; padding: 15px; background: #00ff41; color: #000; font-weight: bold; border: none; margin-bottom: 10px; cursor: pointer; }
        .btn-link { background: #8e44ad; color: #fff; }
        .card { background: #000; border: 1px solid #333; padding: 15px; margin-top: 15px; border-left: 5px solid #00ff41; }
        textarea { width: 100%; height: 100px; background: #222; color: #fff; border: 1px solid #444; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>FOUNDER COMMAND v26</h2>
        <button class="btn" onclick="addBookPage()">+ NEW BOOK PAGE</button>
        <button class="btn btn-link" onclick="addByLink()">🔗 ADD MUSIC/VIDEO VIA LINK (FOR LARGE FILES)</button>
        <button class="btn" style="background:#3498db; color:#fff;" onclick="document.getElementById('fileIn').click()">📂 UPLOAD SMALL FILE (<TB)</button>
        <input type="file" id="fileIn" style="display:none" onchange="handleUpload(event)">
        <div id="adminList"></div>
    </div>

    <script>
        let db;
        const request = indexedDB.open("RootReclaimDB_v26", 1);
        request.onupgradeneeded = (e) => { e.target.result.createObjectStore("archive", { keyPath: "id" }); };
        request.onsuccess = (e) => { db = e.target.result; render(); };

        function addByLink() {
            const url = prompt("Paste Direct Link to Music/Video:");
            if(!url) return;
            const entry = { id: Date.now(), content: "Linked Media", file: url, fName: "Cloud File", fType: url.includes('video') ? 'video' : 'audio' };
            const tx = db.transaction("archive", "readwrite");
            tx.objectStore("archive").add(entry);
            tx.oncomplete = render;
        }

        function handleUpload(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const entry = { id: Date.now(), content: "Upload: " + file.name, file: ev.target.result, fName: file.name, fType: file.type };
                const tx = db.transaction("archive", "readwrite");
                tx.objectStore("archive").add(entry);
                tx.oncomplete = render;
            };
            reader.readAsDataURL(file);
        }

        function addBookPage() {
            const entry = { id: Date.now(), content: "New log entry...", fType: null };
            const tx = db.transaction("archive", "readwrite");
            tx.objectStore("archive").add(entry);
            tx.oncomplete = render;
        }

        function render() {
            const list = document.getElementById('adminList');
            const tx = db.transaction("archive", "readonly");
            tx.objectStore("archive").getAll().onsuccess = (e) => {
                list.innerHTML = e.target.result.sort((a,b)=>b.id-a.id).map(p => `
                    <div class="card">
                        <strong>${p.fName || 'Text Log'}</strong><br>
                        <textarea id="edit-${p.id}">${p.content}</textarea>
                        <button class="btn" style="margin-top:10px;" onclick="save(${p.id})">SAVE & PUBLISH</button>
                        <button class="btn" style="background:red; color:#fff;" onclick="del(${p.id})">DELETE</button>
                    </div>`).join('');
            };
        }

        function save(id) {
            const tx = db.transaction("archive", "readwrite");
            const store = tx.objectStore("archive");
            store.get(id).onsuccess = (e) => {
                const d = e.target.result; d.content = document.getElementById(`edit-${id}`).value;
                store.put(d); tx.oncomplete = () => alert("PUBLISHED");
            };
        }

        function del(id) { if(confirm("Delete?")) { const tx = db.transaction("archive", "readwrite"); tx.objectStore("archive").delete(id); tx.oncomplete = render; } }
    </script>
</body>
</html>
