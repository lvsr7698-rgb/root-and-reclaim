<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ROOT | Founder Control</title>
    <style>
        body { background: #111; color: #00ff41; font-family: monospace; padding: 50px; }
        .admin-box { background: #222; padding: 30px; border: 2px solid #00ff41; max-width: 800px; margin: 0 auto; }
        .page-item { border-bottom: 1px solid #444; padding: 20px 0; }
        textarea { width: 100%; height: 100px; background: #333; color: #fff; border: 1px solid #00ff41; }
        .btn { padding: 10px; background: #00ff41; color: #000; font-weight: bold; border: none; cursor: pointer; margin: 5px; }
        .btn-del { background: red; color: white; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h1>FOUNDER CONTROL PORTAL</h1>
        <button class="btn" onclick="addPage()">+ CREATE NEW PAGE</button>
        <input type="file" id="fileIn" style="display:none" onchange="handleUpload(event)">
        <button class="btn" onclick="document.getElementById('fileIn').click()">📂 UPLOAD MEDIA (ANY SIZE)</button>
        <hr>
        <div id="adminList"></div>
    </div>

    <script>
        let db;
        const request = indexedDB.open("RootReclaimDB", 1);
        request.onsuccess = (e) => { db = e.target.result; render(); };

        function render() {
            const list = document.getElementById('adminList');
            const tx = db.transaction("pages", "readonly");
            tx.objectStore("pages").getAll().onsuccess = (e) => {
                list.innerHTML = e.target.result.map(p => `
                    <div class="page-item">
                        <strong>Page ID: ${p.id}</strong><br>
                        <textarea id="edit-${p.id}">${p.content}</textarea><br>
                        <button class="btn" onclick="savePage(${p.id})">SAVE CHANGES</button>
                        <button class="btn btn-del" onclick="delPage(${p.id})">DELETE PAGE</button>
                    </div>`).join('');
            };
        }

        function addPage() {
            const page = { id: Date.now(), content: "New Log Entry...", file: null, fileName: "", fileType: "" };
            const tx = db.transaction("pages", "readwrite");
            tx.objectStore("pages").add(page);
            tx.oncomplete = render;
        }

        function handleUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const page = { id: Date.now(), content: "Media: " + file.name, file: ev.target.result, fileName: file.name, fileType: file.type };
                const tx = db.transaction("pages", "readwrite");
                tx.objectStore("pages").add(page);
                tx.oncomplete = render;
            };
            reader.readAsDataURL(file);
        }

        function savePage(id) {
            const tx = db.transaction("pages", "readwrite");
            const store = tx.objectStore("pages");
            store.get(id).onsuccess = (e) => {
                const p = e.target.result;
                p.content = document.getElementById(`edit-${id}`).value;
                store.put(p);
                tx.oncomplete = render;
            };
        }

        function delPage(id) {
            if(confirm("Delete?")) {
                const tx = db.transaction("pages", "readwrite");
                tx.objectStore("pages").delete(id);
                tx.oncomplete = render;
            }
        }
    </script>
</body>
</html>
