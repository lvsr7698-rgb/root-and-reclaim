<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ROOT | FOUNDER COMMAND CENTER</title>
    <style>
        :root { --nv-green: #00ff41; --bg-dark: #0a0a0a; --panel-bg: #1a1a1a; }
        body { background: var(--bg-dark); color: var(--nv-green); font-family: 'Consolas', monospace; padding: 40px; margin: 0; }
        .dashboard { max-width: 1000px; margin: 0 auto; background: var(--panel-bg); border: 2px solid var(--nv-green); padding: 30px; box-shadow: 0 0 30px rgba(0,255,65,0.2); }
        h1 { border-bottom: 2px solid var(--nv-green); padding-bottom: 15px; text-transform: uppercase; letter-spacing: 3px; }
        
        /* UPLOAD & CONTROL BUTTONS */
        .controls { background: #222; padding: 25px; border: 1px dashed var(--nv-green); margin-bottom: 40px; display: flex; gap: 15px; }
        .btn { padding: 15px 25px; background: var(--nv-green); color: #000; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; }
        .btn:hover { background: #fff; box-shadow: 0 0 15px var(--nv-green); }
        .btn-blue { background: #3498db; color: #fff; }
        .btn-red { background: #ff3131; color: #fff; }

        /* DATA CARDS */
        .page-card { background: #111; border: 1px solid #333; border-left: 8px solid var(--nv-green); padding: 30px; margin-bottom: 30px; position: relative; }
        .save-banner { background: #004d00; color: #fff; padding: 10px; margin-top: 20px; text-align: center; font-weight: bold; border-radius: 4px; display: block; width: 100%; border: none; cursor: pointer; text-transform: uppercase; }
        .save-banner:hover { background: var(--nv-green); color: #000; }

        textarea { width: 100%; height: 180px; background: #000; color: #fff; border: 1px solid #444; padding: 15px; font-family: inherit; font-size: 1.1rem; margin-top: 15px; outline: none; }
        .media-preview { background: #050505; border: 1px solid #222; padding: 20px; margin: 15px 0; text-align: center; }
        img, video, audio { max-width: 100%; max-height: 300px; border: 1px solid var(--nv-green); }
    </style>
</head>
<body>

    <div id="lock" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h2 style="color:var(--nv-green)">FOUNDER AUTHENTICATION REQUIRED</h2>
        <input type="password" id="passInput" placeholder="Enter Key..." style="padding:10px; background:#111; border:1px solid var(--nv-green); color:#fff; text-align:center;">
        <button class="btn" onclick="checkPass()" style="margin-top:20px;">ACCESS ARCHIVE</button>
    </div>

    <div class="dashboard">
        <h1>Founder Command Center</h1>
        <p style="color: #888;">Logged in as: <strong>Founder SRK</strong> | Status: Authorized</p>

        <div class="controls">
            <button class="btn" onclick="addBlankPage()">+ Create New Book Page</button>
            <button class="btn btn-blue" onclick="document.getElementById('masterUpload').click()">📂 Upload Any File (Music, Video, Image)</button>
            <input type="file" id="masterUpload" style="display:none" onchange="handleUpload(event)">
            <button class="btn btn-red" onclick="purgeArchive()" style="margin-left:auto;">Reset Entire Archive</button>
        </div>

        <div id="adminList">
            </div>
    </div>

    <script>
        let db;
        function checkPass() {
            if(document.getElementById('passInput').value === "admin") {
                document.getElementById('lock').style.display = 'none';
            } else { alert("Key Incorrect."); }
        }

        const request = indexedDB.open("RootReclaimDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("pages")) {
                db.createObjectStore("pages", { keyPath: "id" });
            }
        };
        request.onsuccess = (e) => { db = e.target.result; renderPortal(); };

        function addBlankPage() {
            const newP = { id: Date.now(), content: "Write your analysis here...", file: null, fileName: "", fileType: "", likes: 0, comments: [] };
            const tx = db.transaction("pages", "readwrite");
            tx.objectStore("pages").add(newP);
            tx.oncomplete = renderPortal;
        }

        function handleUpload(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const mediaP = { id: Date.now(), content: "Details for: " + file.name, file: ev.target.result, fileName: file.name, fileType: file.type, likes: 0, comments: [] };
                const tx = db.transaction("pages", "readwrite");
                tx.objectStore("pages").add(mediaP);
                tx.oncomplete = () => { alert("File Synchronized."); renderPortal(); };
            };
            reader.readAsDataURL(file);
        }

        function renderPortal() {
            const list = document.getElementById('adminList');
            const tx = db.transaction("pages", "readonly");
            tx.objectStore("pages").getAll().onsuccess = (e) => {
                const pages = e.target.result.sort((a,b) => b.id - a.id);
                list.innerHTML = pages.map(p => `
                    <div class="page-card">
                        <div style="display:flex; justify-content:space-between; color:#666; font-size:0.7rem;">
                            <span>ID: ${p.id}</span>
                            <span onclick="deleteItem(${p.id})" style="color:red; cursor:pointer;">[DELETE THIS PAGE]</span>
                        </div>
                        
                        ${renderPreview(p)}

                        <textarea id="txt-${p.id}">${p.content}</textarea>

                        <button class="save-banner" onclick="pushToPublic(${p.id})">Save to Public Site Now</button>
                    </div>
                `).join('');
            };
        }

        function renderPreview(p) {
            if(!p.file) return '';
            if(p.fileType.includes('image')) return `<div class="media-preview"><img src="${p.file}"></div>`;
            if(p.fileType.includes('audio')) return `<div class="media-node"><strong>🎵 AUDIO: ${p.fileName}</strong><br><audio controls src="${p.file}"></audio></div>`;
            if(p.fileType.includes('video')) return `<div class="media-node"><video controls src="${p.file}"></video></div>`;
            return `<div>Document: ${p.fileName}</div>`;
        }

        function pushToPublic(id) {
            const text = document.getElementById(`txt-${id}`).value;
            const tx = db.transaction("pages", "readwrite");
            const store = tx.objectStore("pages");
            store.get(id).onsuccess = (e) => {
                const data = e.target.result;
                data.content = text;
                store.put(data);
                tx.oncomplete = () => alert("SUCCESS: Data is now visible on index.html");
            };
        }

        function deleteItem(id) {
            if(confirm("Purge this item?")) {
                const tx = db.transaction("pages", "readwrite");
                tx.objectStore("pages").delete(id);
                tx.oncomplete = renderPortal;
            }
        }

        function purgeArchive() { if(confirm("WIPE EVERYTHING?")) { indexedDB.deleteDatabase("RootReclaimDB"); location.reload(); } }
    </script>
</body>
</html>
